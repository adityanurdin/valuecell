# Raspberry Pi — backend + frontend on the same device
#
# Recommended:
#   ./scripts/pi-deploy.sh
#
# Pi B+ (ARMv6): Bun/Node cannot build on the Pi. On a PC/Mac first:
#   ./scripts/export-frontend-build.sh
#   scp frontend-build.tar.gz homepi@<pi>:~/valuecell/
#   ./scripts/pi-deploy.sh    # auto-imports tarball + starts nginx
#
# Pi 3/4: may build on-device with Bun, or use export tarball too.
#
# Backend excludes optional `full` extras (lancedb, crawl4ai/patchright) — required for ARMv6.
#
# Pi 4 / 64-bit with 2GB+ RAM — optional in-docker frontend build:
#   FRONTEND_DOCKERFILE=docker/frontend.Dockerfile ./scripts/pi-deploy.sh
#
# Copy pre-built UI from another PC (if Bun fails on Pi B+ ARMv6):
#   rsync -av frontend/build/client/ pi@host:~/valuecell/frontend/build/client/
#   SKIP_FRONTEND_BUILD=1 ./scripts/pi-deploy.sh

services:
  backend:
    build:
      args:
        UV_EXTRAS: ""
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      start_period: 180s

  frontend:
    build:
      dockerfile: ${FRONTEND_DOCKERFILE:-docker/frontend.nginx.Dockerfile}
      args:
        VITE_API_BASE_URL: /api/v1
    deploy:
      resources:
        limits:
          memory: 128M
